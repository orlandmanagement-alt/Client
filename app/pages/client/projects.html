<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Client Projects</title>
</head>
<body>
  <script type="module">
    import { mountClientShell } from "../../js/client_shell.js";
    import mod from "../../modules/client/mod_client_projects.js";

    mountClientShell("Projects", `
      <div style="margin-top:16px;">
        <form id="projectSearchForm">
          <input id="projectSearchInput" type="text" placeholder="Search project title">
          <button type="submit">Search</button>
          <button type="button" id="projectReloadBtn">Reload</button>
        </form>
      </div>

      <div style="margin-top:16px;">
        <h2>Project List</h2>
        <div id="projectInfo">Loading projects...</div>
        <ul id="projectList"></ul>
      </div>
    `);

    mod();
  </script>
</body>
</html>
