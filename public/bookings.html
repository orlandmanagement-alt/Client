<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Client Bookings</title>
</head>
<body>
  <script type="module">
    import { mountClientShell } from "./assets/js/client_shell.js";
    import mod from "./modules/mod_client_bookings.js";

    mountClientShell("Project Bookings", `
      <div style="margin-top:16px;">
        <form id="clientBookingFilterForm">
          <input id="clientBookingProjectId" type="text" placeholder="Project ID (optional)">
          <button type="submit">Load Bookings</button>
        </form>
      </div>

      <div style="margin-top:16px;">
        <div id="clientBookingInfo">Loading bookings...</div>
        <ul id="clientBookingList"></ul>
      </div>
    `);

    mod();
  </script>
</body>
</html>
