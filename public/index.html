<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Portal - Orland Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { primary: '#2563eb' }, 
                    fontFamily: { sans: ['Poppins', 'sans-serif'] } 
                } 
            } 
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <div id="global-loader" class="fixed inset-0 bg-white z-[100] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] animate-pulse">O R L A N D • C L I E N T</p>
    </div>

    <div id="app-shell" class="flex min-h-screen hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="p-6">
                <div class="text-xl font-black text-blue-600 tracking-tighter italic">ORLAND<span class="text-slate-400 font-light">CLIENT</span></div>
            </div>
            
            <nav class="mt-4 px-4 space-y-1">
                <a href="javascript:void(0)" onclick="loadModule('dashboard', this)" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 transition-all font-bold text-slate-600">
                    <i class="fa-solid fa-grid-2 w-5"></i> Dashboard
                </a>
                <a href="javascript:void(0)" onclick="loadModule('talents', this)" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 transition-all font-bold text-slate-600">
                    <i class="fa-solid fa-users-viewfinder w-5"></i> Cari Talent
                </a>
                <a href="javascript:void(0)" onclick="loadModule('bookings', this)" class="flex items-center gap-3 p-3 rounded-xl hover:bg-slate-100 transition-all font-bold text-slate-600">
                    <i class="fa-solid fa-calendar-check w-5"></i> Pesanan
                </a>
                
                <div class="pt-10">
                    <button onclick="logout()" class="flex items-center gap-3 p-3 w-full text-red-500 hover:bg-red-50 rounded-xl transition-all font-black uppercase text-xs tracking-widest">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </nav>
        </aside>

        <main class="flex-1 lg:ml-64 flex flex-col min-h-screen">
            <header class="bg-white/80 backdrop-blur-md border-b p-4 flex items-center justify-between lg:hidden sticky top-0 z-40">
                <button onclick="document.getElementById('sidebar').classList.toggle('-translate-x-full')" class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-lg text-slate-600">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>
                <span class="font-black text-blue-600 tracking-tighter">CLIENT PORTAL</span>
                <div class="w-10 h-10 bg-slate-200 rounded-full border-2 border-white shadow-sm"></div>
            </header>

            <div id="main-content" class="p-4 md:p-10 max-w-7xl mx-auto w-full">
                </div>
        </main>
    </div>

    <script type="module">
        import { checkSession, logout } from "./assets/js/session_manager.js";
        import { loadModule } from "./assets/js/ui.js";
        import config from "./assets/js/config.js";

        // Global Bindings
        window.loadModule = loadModule;
        window.logout = logout;

        async function init() {
            const loader = document.getElementById('global-loader');
            const shell = document.getElementById('app-shell');

            try {
                const user = await checkSession();
                
                if (user && user.role === 'client') {
                    // Berhasil: Tampilkan Dashboard
                    loader.classList.add('opacity-0');
                    setTimeout(() => {
                        loader.classList.add('hidden');
                        shell.classList.remove('hidden');
                        loadModule('dashboard'); 
                    }, 500);
                } else {
                    // Gagal: Lempar ke SSO Client
                    window.location.href = `${config.SSO_URL}/?redirect=client`;
                }
            } catch (e) {
                console.error("Auth Error:", e);
                window.location.href = `${config.SSO_URL}/?redirect=client`;
            }
        }

        init();
    </script>
</body>
</html>
