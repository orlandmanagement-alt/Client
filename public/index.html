<!DOCTYPE html>
<html>
<body>
<script type="module">
import { initSession } from "/assets/js/session.js";
import { registerRoute, resolveRoute, resolveDefaultRoute } from "/assets/js/router.js";

import dashboard from "/modules/mod_dashboard.js";
import projects from "/modules/mod_projects.js";
import pipeline from "/modules/mod_pipeline.js";
import bookings from "/modules/mod_bookings.js";
import invites from "/modules/mod_invites.js";
import applications from "/modules/mod_applications.js";
import roles from "/modules/mod_roles.js";

await initSession();

registerRoute("/", dashboard);
registerRoute("/projects", projects);
registerRoute("/pipeline", pipeline);
registerRoute("/bookings", bookings);
registerRoute("/invites", invites);
registerRoute("/applications", applications);
registerRoute("/roles", roles);
registerRoute("/client", dashboard);
registerRoute("/admin", dashboard);

if(location.pathname === "/"){
  history.replaceState({}, "", resolveDefaultRoute());
}

await resolveRoute();
</script>
</body>
</html>
