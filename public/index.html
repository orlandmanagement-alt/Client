<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orland Client - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #app { transition: opacity 0.2s ease-in-out; }
        .nav-active { opacity: 1 !important; color: #3b82f6 !important; transform: scale(1.2); }
    </style>
</head>
<body class="antialiased">
    <div id="app" class="min-h-screen pb-28 opacity-1"></div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900/95 backdrop-blur-xl px-10 py-5 rounded-[3rem] flex gap-12 text-white shadow-2xl z-50 border border-white/5">
        <a href="#dashboard" class="nav-link opacity-40 transition-all" data-route="dashboard"><i class="fa-solid fa-grid-2 text-sm"></i></a>
        <a href="#search_filter" class="nav-link opacity-40 transition-all" data-route="search_filter"><i class="fa-solid fa-magnifying-glass text-sm"></i></a>
        <a href="#notifications" class="nav-link opacity-40 transition-all" data-route="notifications"><i class="fa-solid fa-bell text-sm"></i></a>
        <a href="#settings" class="nav-link opacity-40 transition-all" data-route="settings"><i class="fa-solid fa-user-gear text-sm"></i></a>
    </nav>

    <script type="module" src="/assets/js/router_client.js"></script>
</body>
</html>
