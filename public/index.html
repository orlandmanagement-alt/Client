<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Portal - Orland Management</title>
  <style>
      body { font-family: sans-serif; background-color: #f3f4f6; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
      .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
      .btn { background: #1f2937; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px;}
  </style>
</head>
<body>
<div id="app" class="card">
  <h2>Memeriksa Akses Perusahaan...</h2>
  <p style="color:gray;">Menghubungkan ke Orland SSO</p>
</div>
<script type="module">
import { checkSession } from "/assets/js/auth.js";
import config from "/assets/js/config.js";
async function init() {
  const user = await checkSession();
  if (user) {
    if (user.role !== config.APP && user.role !== 'admin') {
         window.location.href = user.role === 'talent' ? 'https://talent.orlandmanagement.com' : config.SSO_URL;
         return;
    }
    window.location.href = "/dashboard.html";
  } else {
    document.getElementById("app").innerHTML = `
      <h1 style="text-transform: uppercase; color:#1f2937;">CLIENT HUB</h1>
      <p style="color:gray;">Rekrut Talent Terbaik untuk Proyek Anda</p>
      <button class="btn" onclick="window.location.href='${config.SSO_URL}'">Masuk Sebagai Client</button>
    `;
  }
}
init();
</script>
</body>
</html>
