<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Client Roles</title>
</head>
<body>
  <script type="module">
    import { mountClientShell } from "./assets/js/client_shell.js";
    import mod from "./modules/mod_client_roles.js";

    mountClientShell("Project Roles", `
      <div style="margin-top:16px;">
        <form id="clientRoleFilterForm">
          <input id="clientRoleProjectId" type="text" placeholder="Project ID (optional)">
          <button type="submit">Load Roles</button>
          <button type="button" id="clientRoleReloadBtn">Reload</button>
        </form>
      </div>

      <div style="margin-top:16px;">
        <div id="clientRoleInfo">Loading roles...</div>
        <ul id="clientRoleList"></ul>
      </div>
    `);

    mod();
  </script>
</body>
</html>
