<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Client Applications Review</title>
</head>
<body>
  <script type="module">
    import { mountClientShell } from "./assets/js/client_shell.js";
    import mod from "./modules/mod_client_applications.js";

    mountClientShell("Applications Review", `
      <div style="margin-top:16px;">
        <form id="clientApplicationFilterForm">
          <input id="clientApplicationProjectId" type="text" placeholder="Project ID (optional)">
          <button type="submit">Load</button>
        </form>
      </div>

      <div style="margin-top:16px;">
        <div id="clientApplicationInfo">Loading applications...</div>
        <ul id="clientApplicationList"></ul>
      </div>
    `);

    mod();
  </script>
</body>
</html>
